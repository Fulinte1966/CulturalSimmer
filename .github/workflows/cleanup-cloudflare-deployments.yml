name: Clean Stale Cloudflare Deployments

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DELETE STALE CLOUDFLARE DEPLOYMENTS
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publication-catalog-mutation
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    environment: cloudflare-pages
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_KEEP_BRANCHES: main,ebook-preview,removal-preview,catalog-reset-preview
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate confirmation
        run: test "${{ inputs.confirmation }}" = "DELETE STALE CLOUDFLARE DEPLOYMENTS"

      - name: Remove stale deployments
        run: node scripts/cleanup-cloudflare-deployments.mjs
