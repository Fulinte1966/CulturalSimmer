name: Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 16 * * *" # UTC 16:00 = Beijing 00:00, daily weather refresh
  workflow_dispatch:
    inputs:
      notify_updates:
        description: Dispatch reader notifications after a successful deployment
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment:
      name: netlify-mirror
    env:
      PUBLIC_ASSET_BASE_URL: ${{ vars.PUBLIC_ASSET_BASE_URL }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - run: npm ci
      - run: pip install -r scripts/requirements.txt
      - run: npm run verify
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - uses: actions/upload-artifact@v6
        with:
          name: site-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-netlify:
    environment:
      name: netlify-mirror
      url: https://culturalsimmer-mirror.netlify.app/CulturalSimmer/
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: site-dist
          path: site-dist
      - name: Prepare Netlify mirror
        run: |
          mkdir -p netlify-dist/CulturalSimmer
          cp -R site-dist/. netlify-dist/CulturalSimmer/
      - name: Deploy Netlify mirror
        run: >-
          npm exec netlify -- deploy
          --prod
          --no-build
          --dir=netlify-dist
          --site="${NETLIFY_SITE_ID}"
          --message="GitHub Actions ${GITHUB_SHA}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy-netlify
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  notify:
    if: github.event_name == 'workflow_dispatch' && inputs.notify_updates
    continue-on-error: true
    needs: deploy
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - id: dispatch
        name: Dispatch reader notification workflows
        env:
          NOTIFIER_DISPATCH_TOKEN: ${{ secrets.NOTIFIER_DISPATCH_TOKEN }}
        run: |
          if [[ -z "$NOTIFIER_DISPATCH_TOKEN" ]]; then
            echo "::warning::NOTIFIER_DISPATCH_TOKEN is not configured; scheduled notification polling remains available."
            exit 1
          fi

          api_root="https://api.github.com/repos/Fulinte1966/CulturalSimmer-notifier/actions/workflows"
          payload='{"ref":"main","inputs":{"mode":"live"}}'
          status=0
          for workflow in notify.yml notify-ntfy.yml; do
            if ! curl --fail --silent --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $NOTIFIER_DISPATCH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data "$payload" \
              "$api_root/$workflow/dispatches"; then
              status=1
            fi
          done
          exit "$status"

      - name: Record notification dispatch status
        if: always()
        env:
          DISPATCH_OUTCOME: ${{ steps.dispatch.outcome }}
        run: |
          {
            echo "## Reader notification dispatch"
            echo
            echo "Dispatch outcome: \`$DISPATCH_OUTCOME\`."
            echo "Daily notifier polling remains the independent fallback."
          } >> "$GITHUB_STEP_SUMMARY"
