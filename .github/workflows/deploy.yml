name: Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 16 * * *" # UTC 16:00 = Beijing 00:00, daily weather refresh
  workflow_dispatch:
    inputs:
      notify_updates:
        description: Dispatch reader notifications after both public sites succeed
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ops-start:
    if: github.event_name != 'schedule'
    continue-on-error: true
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Report production deployment start
        env:
          NOTIFIER_DISPATCH_TOKEN: ${{ secrets.NOTIFIER_DISPATCH_TOKEN }}
        run: |
          if [[ -z "$NOTIFIER_DISPATCH_TOKEN" ]]; then
            echo "::warning::NOTIFIER_DISPATCH_TOKEN is not configured; deployment observability is unavailable."
            exit 1
          fi
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $NOTIFIER_DISPATCH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data '{"ref":"main","inputs":{"event_id":"site.deploy","phase":"firing","variant":"started"}}' \
            "https://api.github.com/repos/Fulinte1966/CulturalSimmer-notifier/actions/workflows/notify-ops.yml/dispatches"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - run: npm ci
      - run: pip install -r scripts/requirements.txt
      - run: npm run verify
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - uses: actions/upload-artifact@v6
        with:
          name: site-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-cloudflare:
    environment:
      name: cloudflare-pages
      url: https://fulinte.pages.dev/CulturalSimmer/
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: site-dist
          path: site-dist
      - name: Prepare Cloudflare Pages primary site
        run: npm run cloudflare:prepare -- site-dist cloudflare-dist
      - name: Ensure Cloudflare Pages project exists
        run: |
          response_file="$RUNNER_TEMP/cloudflare-pages-project.json"
          status="$(
            curl --silent --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/fulinte"
          )"
          case "$status" in
            200)
              echo "Cloudflare Pages project already exists."
              ;;
            404)
              npm exec wrangler -- pages project create fulinte \
                --production-branch=main
              ;;
            *)
              echo "::error::Unable to inspect the Cloudflare Pages project (HTTP $status)."
              exit 1
              ;;
          esac
      - name: Deploy Cloudflare Pages primary site
        run: >-
          npm exec wrangler -- pages deploy cloudflare-dist
          --project-name=fulinte
          --branch=main
          --commit-hash="${GITHUB_SHA}"
          --commit-message="GitHub Actions ${GITHUB_SHA}"
          --commit-dirty=true
      - name: Prepare legacy Cloudflare redirect
        run: npm run cloudflare:legacy -- cloudflare-legacy-dist
      - name: Redirect the former Cloudflare address
        run: >-
          npm exec wrangler -- pages deploy cloudflare-legacy-dist
          --project-name=culturalsimmer-mirror
          --branch=main
          --commit-hash="${GITHUB_SHA}"
          --commit-message="Redirect to fulinte.pages.dev at ${GITHUB_SHA}"
          --commit-dirty=true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  ops-finish:
    if: always() && github.event_name != 'schedule'
    continue-on-error: true
    needs:
      - build
      - deploy-cloudflare
      - deploy
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Report production deployment result
        env:
          NOTIFIER_DISPATCH_TOKEN: ${{ secrets.NOTIFIER_DISPATCH_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          CLOUDFLARE_RESULT: ${{ needs.deploy-cloudflare.result }}
          PAGES_RESULT: ${{ needs.deploy.result }}
        run: |
          if [[ -z "$NOTIFIER_DISPATCH_TOKEN" ]]; then
            echo "::warning::NOTIFIER_DISPATCH_TOKEN is not configured; deployment observability is unavailable."
            exit 1
          fi
          if [[ "$BUILD_RESULT" == success && "$CLOUDFLARE_RESULT" == success && "$PAGES_RESULT" == success ]]; then
            payload='{"ref":"main","inputs":{"event_id":"site.deploy","phase":"resolved","variant":"started"}}'
          else
            payload='{"ref":"main","inputs":{"event_id":"site.deploy","phase":"firing","variant":"failed"}}'
          fi
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $NOTIFIER_DISPATCH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$payload" \
            "https://api.github.com/repos/Fulinte1966/CulturalSimmer-notifier/actions/workflows/notify-ops.yml/dispatches"

  notify:
    if: github.event_name == 'workflow_dispatch' && inputs.notify_updates
    continue-on-error: true
    needs:
      - deploy-cloudflare
      - deploy
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - id: dispatch
        name: Dispatch reader notification workflows
        env:
          NOTIFIER_DISPATCH_TOKEN: ${{ secrets.NOTIFIER_DISPATCH_TOKEN }}
        run: |
          if [[ -z "$NOTIFIER_DISPATCH_TOKEN" ]]; then
            echo "::warning::NOTIFIER_DISPATCH_TOKEN is not configured; scheduled notification polling remains available."
            exit 1
          fi

          api_root="https://api.github.com/repos/Fulinte1966/CulturalSimmer-notifier/actions/workflows"
          payload='{"ref":"main","inputs":{"mode":"live"}}'
          status=0
          for workflow in notify.yml notify-ntfy.yml; do
            if ! curl --fail --silent --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $NOTIFIER_DISPATCH_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data "$payload" \
              "$api_root/$workflow/dispatches"; then
              status=1
            fi
          done
          exit "$status"

      - name: Record notification dispatch status
        if: always()
        env:
          DISPATCH_OUTCOME: ${{ steps.dispatch.outcome }}
        run: |
          {
            echo "## Reader notification dispatch"
            echo
            echo "Dispatch outcome: \`$DISPATCH_OUTCOME\`."
            echo "Scheduled notifier polling remains the independent fallback."
          } >> "$GITHUB_STEP_SUMMARY"
