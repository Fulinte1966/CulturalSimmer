name: 网络捉虫
description: 报告网站功能、链接、显示、交互等问题
title: "[网络捉虫] "
labels:
  - 类型：网络捉虫
  - 状态：待核查
body:
  - type: markdown
    attributes:
      value: |
        ## 网络捉虫

        请只在这里提交网站功能、链接、显示、交互等问题。
        书籍文字、页码、排版等勘误请返回上一页，使用“读者勘误表”链接提交。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明你遇到的问题。
      placeholder: 例如：某个下载链接失效、页面显示错位、搜索结果异常……
    validations:
      required: true

  - type: input
    id: page_url
    attributes:
      label: 页面链接
      description: 出问题的网页 URL。
      placeholder: https://...
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如果可以，请写出如何复现这个问题。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 看到……
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 可选。浏览器、系统、设备等。
      placeholder: 例如：Chrome / Safari，macOS / Windows / iOS / Android
    validations:
      required: false
