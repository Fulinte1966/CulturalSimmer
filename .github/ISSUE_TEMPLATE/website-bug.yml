name: 网络捉虫
description: 报告网站功能、链接、下载、显示、搜索等问题。书籍内容勘误请使用读者勘误表。
title: "[网络捉虫] "
labels:
  - 类型：网络捉虫
  - 状态：待核查

body:
  - type: markdown
    attributes:
      value: |
        ## 网络捉虫

        请在这里报告网站功能、链接、下载、显示、搜索、交互等问题。

        书籍正文、页码、排版、目录、封面等勘误请不要在这里提交，请使用“读者勘误表”。

  - type: dropdown
    id: category
    attributes:
      label: 问题类型
      description: 请选择最接近的一类。
      options:
        - 下载问题
        - 链接失效
        - 页面显示异常
        - 搜索或索引问题
        - 字体或排版显示问题
        - 移动端适配问题
        - 其他网站问题
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请简要说明你遇到的问题。
      placeholder: 例如：点击某本书的下载按钮后没有反应，或页面在手机上显示错位。
    validations:
      required: true

  - type: input
    id: page_url
    attributes:
      label: 出错页面
      description: 请粘贴出问题的页面链接。如果不确定，可留空。
      placeholder: https://...
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如果可以，请写出如何触发这个问题。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 看到……
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: 实际表现
      description: 实际发生了什么？
      placeholder: 例如：页面空白、下载 404、按钮无响应、文字重叠……
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: 预期表现
      description: 你原本预期应该发生什么？
      placeholder: 例如：应正常下载 PDF，或应显示书籍详情页。
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: 可直接拖拽图片到此处。可选。
      placeholder: 如果有截图，请粘贴或拖入这里。
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 可选。请填写浏览器、系统、设备等信息。
      placeholder: |
        浏览器：Chrome / Safari / Firefox / Edge
        系统：Windows / macOS / iOS / Android
        设备：电脑 / 手机 / 平板
    validations:
      required: false
