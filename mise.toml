[settings]
idiomatic_version_file_enable_tools = ["node", "python"]

[tasks.setup]
description = "Install Node and Python project dependencies"
run = "npm ci && python -m pip install -r scripts/requirements.txt"

[tasks.test]
description = "Run all Node and Python tests"
run = """
npm run test:ui
npm run test:metadata
npm run test:ingest
npm run test:changelog
npm run test:reading
"""

[tasks.check]
description = "Run tests, data validation, type checks, and the production build"
depends = ["test"]
run = """
npm run validate
npm run check
npm run build
"""
